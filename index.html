<style>
  :root{
    --navy:#1E4E66;
    --navy-dark:#123344;
    --mint:#30DD92;
    --mint-dark:#1FA870;
    --bg:#F4F6F7;
    --panel:#FFFFFF;
    --ink:#1A2327;
    --muted:#5B6B72;
    --line:#DCE3E6;
    --amber:#C97B15;
    --amber-bg:#FCF1E0;
    --red:#B3261E;
    --red-bg:#FBEAE9;
    --green-bg:#E9FBF3;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:Aptos, "Segoe UI", Calibri, "Helvetica Neue", Arial, sans-serif;
    line-height:1.5;
  }

  /* ---- Top bar ---- */
  .topbar{
    background:var(--navy-dark);
    color:#fff;
    display:flex;
    align-items:center;
    gap:28px;
    padding:0 24px;
    height:56px;
    position:sticky; top:0; z-index:50;
  }
  .topbar .brand{display:flex; align-items:center; gap:10px; flex:none;}
  .topbar .brand-mark{width:12px;height:12px;border-radius:50%;background:var(--mint);}
  .topbar .brand-name{font-weight:700; font-size:14px; letter-spacing:.02em;}
  .tabnav{display:flex; gap:4px; flex:1; overflow-x:auto;}
  .tabnav button{
    background:transparent; border:none; color:#B9CFDA;
    padding:10px 16px; font-size:13.5px; font-weight:700;
    cursor:pointer; border-radius:8px 8px 0 0; font-family:inherit;
    white-space:nowrap;
  }
  .tabnav button:hover{color:#fff; background:rgba(255,255,255,0.06);}
  .tabnav button.active{color:var(--navy-dark); background:var(--mint);}

  .app{
    display:grid;
    grid-template-columns: 300px 1fr;
    min-height:calc(100vh - 56px);
  }
  .app.full{grid-template-columns: 1fr;}
  @media (max-width: 880px){
    .app{grid-template-columns: 1fr;}
    .rail{position:static;}
  }

  /* ---- Rail ---- */
  .rail{
    background:var(--navy);
    color:#fff;
    padding:28px 24px;
    position:sticky;
    top:56px;
    align-self:start;
    min-height:calc(100vh - 56px);
  }
  .rail h1{ font-size:19px; line-height:1.25; margin:0 0 4px; font-weight:700;}
  .rail p.sub{ font-size:13px; color:#CFE0E8; margin:0 0 24px;}
  .steps{list-style:none; margin:0; padding:0;}
  .steps li{
    display:flex; gap:12px; align-items:flex-start; padding:11px 0;
    border-top:1px solid rgba(255,255,255,0.12); font-size:13.5px; color:#B9CFDA;
  }
  .steps li:first-child{border-top:none;}
  .steps li.active{color:#fff;}
  .steps li.done{color:#CFF6E3;}
  .step-num{
    width:22px;height:22px;border-radius:50%; border:1.5px solid #6E93A5;
    display:flex;align-items:center;justify-content:center; font-size:11px; font-weight:700;
    flex:none; color:#B9CFDA;
  }
  .steps li.active .step-num{border-color:var(--mint); background:var(--mint); color:var(--navy-dark);}
  .steps li.done .step-num{border-color:var(--mint); color:var(--mint);}
  .verdict-box{margin-top:24px; padding:14px; border-radius:10px; background:rgba(255,255,255,0.08); font-size:13px;}
  .verdict-box .label{text-transform:uppercase; letter-spacing:.06em; font-size:11px; color:#9FC0CF; margin-bottom:6px;}
  .verdict-pill{display:inline-block; padding:4px 10px; border-radius:999px; font-weight:700; font-size:12px;}
  .verdict-pill.pending{background:#3A6377; color:#D9E8EE;}
  .verdict-pill.oui{background:var(--mint); color:var(--navy-dark);}
  .verdict-pill.non{background:#E4E9EA; color:var(--navy-dark);}
  .verdict-pill.grise{background:#E8B85B; color:#3A2A00;}
  .switch-box{
    margin-top:16px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.15);
    font-size:12.5px; color:#B9CFDA;
  }
  .switch-box button{
    margin-top:8px; width:100%; background:rgba(255,255,255,0.1); color:#fff;
    border:1px solid rgba(255,255,255,0.25); padding:8px 10px; border-radius:8px;
    font-size:12.5px; font-weight:700; cursor:pointer; font-family:inherit;
  }
  .switch-box button:hover{background:rgba(255,255,255,0.2);}

  /* ---- Main ---- */
  main{padding:36px 48px; max-width:920px;}
  @media (max-width:880px){ main{padding:22px;} }
  .eyebrow{font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--mint-dark); font-weight:700; margin-bottom:8px;}
  h2{font-size:25px; margin:0 0 6px; color:var(--navy-dark);}
  .panel-sub{color:var(--muted); margin:0 0 24px; font-size:14.5px;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:22px; margin-bottom:16px;}
  .option-grid{display:flex; flex-direction:column; gap:10px;}
  .option{display:flex; align-items:flex-start; gap:14px; border:1.5px solid var(--line); border-radius:10px; padding:15px; cursor:pointer; transition:border-color .15s, background .15s; background:#fff;}
  .option:hover{border-color:var(--mint);}
  .option.selected{border-color:var(--navy); background:#EFF5F7;}
  .option input{margin-top:3px; accent-color:var(--navy); flex:none;}
  .option .opt-title{font-weight:700; font-size:14.5px; margin-bottom:2px;}
  .option .opt-desc{font-size:13px; color:var(--muted);}
  select, input[type=text], input[type=date], input[type=number]{
    width:100%; padding:9px 12px; border:1.5px solid var(--line); border-radius:8px;
    font-size:14px; font-family:inherit; color:var(--ink); background:#fff;
  }
  select:focus, input:focus{outline:2px solid var(--mint); outline-offset:1px; border-color:var(--mint);}
  label.field-label{display:block; font-size:13px; font-weight:700; color:var(--navy-dark); margin-bottom:6px;}
  .field{margin-bottom:15px;}
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media (max-width:600px){.field-row{grid-template-columns:1fr;}}
  .btn{display:inline-flex; align-items:center; gap:8px; background:var(--navy); color:#fff; border:none; padding:11px 18px; border-radius:8px; font-size:13.5px; font-weight:700; cursor:pointer; font-family:inherit;}
  .btn:hover{background:var(--navy-dark);}
  .btn.secondary{background:#fff; color:var(--navy); border:1.5px solid var(--navy);}
  .btn.secondary:hover{background:#EFF5F7;}
  .btn.success{background:var(--mint-dark);}
  .btn.success:hover{background:#188C5D;}
  .btn:disabled{opacity:.45; cursor:not-allowed;}
  .btn-row{display:flex; gap:12px; margin-top:22px; flex-wrap:wrap;}
  .banner{border-radius:10px; padding:16px 18px; margin-bottom:22px; display:flex; gap:14px; align-items:flex-start;}
  .banner.oui{background:var(--green-bg); border:1px solid #9FE3C4;}
  .banner.non{background:#EEF2F3; border:1px solid var(--line);}
  .banner.grise{background:var(--amber-bg); border:1px solid #EAC489;}
  .banner .icon{font-size:20px; line-height:1;}
  .banner .txt strong{display:block; font-size:15px; margin-bottom:2px;}
  .banner .txt span{font-size:13px; color:var(--muted);}
  .demarche{display:flex; gap:12px; padding:13px 0; border-top:1px solid var(--line);}
  .demarche:first-child{border-top:none;}
  .demarche input[type=checkbox]{ width:20px; height:20px; margin-top:2px; accent-color:var(--mint-dark); flex:none; cursor:pointer;}
  .demarche .content{flex:1;}
  .demarche .content .title{font-weight:700; font-size:14px; margin-bottom:3px;}
  .demarche.checked .content .title{ text-decoration:line-through; color:var(--muted);}
  .demarche .content .desc{font-size:13px; color:var(--muted); margin-bottom:7px;}
  .demarche .content a.link{font-size:12.5px; font-weight:700; color:var(--navy); text-decoration:none; border-bottom:1.5px solid var(--mint);}
  .demarche .content a.link:hover{color:var(--mint-dark);}
  .tag{display:inline-block; font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:999px; background:#EEF2F3; color:var(--muted); margin-left:8px;}
  textarea.output{width:100%; min-height:230px; border:1.5px solid var(--line); border-radius:8px; padding:14px; font-family:"Courier New", monospace; font-size:12px; line-height:1.55; color:var(--ink); resize:vertical; background:#FAFBFB;}
  .doc-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:8px;}
  .doc-header h3{margin:0; font-size:15.5px; color:var(--navy-dark);}
  .doc-actions{display:flex; gap:8px; flex-wrap:wrap;}
  .warn-note{font-size:12.5px; color:var(--muted); background:#F8F5EC; border:1px solid #E9DFC2; border-radius:8px; padding:11px 13px; margin-top:14px;}
  .progress-line{font-size:13px; color:var(--muted); margin-bottom:6px;}
  footer.appfoot{margin-top:28px; font-size:11.5px; color:var(--muted); border-top:1px solid var(--line); padding-top:14px;}

  /* ---- Documentation ---- */
  details.doc-entry{background:var(--panel); border:1px solid var(--line); border-radius:10px; margin-bottom:10px; padding:0;}
  details.doc-entry summary{padding:14px 18px; font-weight:700; font-size:14.5px; color:var(--navy-dark); cursor:pointer; list-style:none;}
  details.doc-entry summary::-webkit-details-marker{display:none;}
  details.doc-entry summary::before{content:"▸ "; color:var(--mint-dark);}
  details.doc-entry[open] summary::before{content:"▾ "; }
  details.doc-entry .doc-body{padding:0 18px 16px; font-size:13.5px; color:var(--ink);}
  details.doc-entry .doc-body p{margin:0 0 10px;}
  details.doc-entry .doc-body strong{color:var(--navy-dark);}

  /* ---- Historique table ---- */
  table.histo{width:100%; border-collapse:collapse; font-size:13px;}
  table.histo th{background:var(--navy); color:#fff; text-align:left; padding:10px 12px; font-size:12px;}
  table.histo td{padding:10px 12px; border-bottom:1px solid var(--line); vertical-align:top;}
  table.histo tr:nth-child(even) td{background:#FAFBFB;}
  .status-chip{display:inline-block; padding:2px 9px; border-radius:999px; font-size:11px; font-weight:700;}
  .status-chip.done{background:var(--green-bg); color:var(--mint-dark); border:1px solid #9FE3C4;}
  .status-chip.progress{background:var(--amber-bg); color:var(--amber); border:1px solid #EAC489;}
  .row-del{background:none; border:none; color:var(--red); cursor:pointer; font-size:12.5px; font-weight:700;}
  .empty-state{padding:40px 20px; text-align:center; color:var(--muted);}
</style>
</head>

  <div class="brand"><span class="brand-mark"></span><span class="brand-name">CYIM · Mobilité internationale</span></div>
  <div class="tabnav" id="tabnav"></div>

<script>
/* ============================= DONNÉES PAYS ============================= */

const UE_COUNTRIES = [
  ["Allemagne","zoll.de","https://www.zoll.de", true],

  ["Belgique","limosa.be","https://www.limosa.be", true],

  ["Islande","vinnumalastofnun.is","https://www.vinnumalastofnun.is", false],
  ["Italie","distaccoue.lavoro.gov.it","https://www.lavoro.gov.it", true],
  ["Lettonie","lm.gov.lv","https://www.lm.gov.lv", false],
  ["Liechtenstein","llv.li","https://www.llv.li", true],
  ["Lituanie","vdi.lt","https://www.vdi.lt", true],
  ["Luxembourg","guichet.public.lu","https://guichet.public.lu", true],
  ["Malte","dier.gov.mt","https://dier.gov.mt", true],
  ["Norvège","udi.no","https://www.udi.no", true],
  ["Pays-Bas","postedworkers.nl","https://www.postedworkers.nl", true],
  ["Pologne","biznes.gov.pl","https://www.biznes.gov.pl", true],
  ["Portugal","portal.act.gov.pt","https://portal.act.gov.pt", true],
  ["République tchèque","suip.cz","https://www.suip.cz", true],
  ["Roumanie","e-guvernare.ro","https://www.e-guvernare.ro", false],
  ["Slovaquie","ip.gov.sk","https://www.ip.gov.sk", true],
  ["Slovénie","napotenidelavci.si","https://www.napotenidelavci.si", true],
  ["Suède","av.se","https://www.av.se", true],
  ["Suisse","sem.admin.ch","https://www.sem.admin.ch", true],
];

const GENERIC_BILAT = "Certificat bilatéral possible (formulaire dédié aux conventions bilatérales), sous réserve que la convention entre la France et ce pays couvre le détachement — à vérifier avant la première mission vers cette destination.";

function diplomatieUrl(slug){
  return `https://www.diplomatie.gouv.fr/fr/information-par-pays/${slug}/conseils-aux-voyageurs-voyages-d-affaires`;
}

const OTHER_COUNTRIES = {
  "Royaume-Uni": {
    zone: "uk", slug: "royaume-uni",
    certificat: "Certificat A1 via l'accord de commerce et de coopération UE-UK (procédure de détachement classique — pas d'accord-cadre télétravail signé par le UK)",
    declaration: "Aucune déclaration préalable de type SIPSI au Royaume-Uni pour une mission technique ; vérifier le régime d'immigration (Standard Visitor) pour les activités autorisées.",
    portailNom: "gov.uk (Standard Visitor)",
    portailUrl: "https://www.gov.uk/permitted-paid-engagement-visa",
    note: "Détachement plafonné à 24 mois, sans aucune prolongation ni dérogation exceptionnelle possible. Pour le télétravail, la démarche A1 suit la procédure normale de détachement (le bouton « Télétravail dérogatoire » d'urssaf.fr est inutilisable pour cette destination)."
  },

  // --- Maghreb ---
  "Maroc": { zone:"bilateral", slug:"maroc", certificat:"Certificat bilatéral (convention du 22 octobre 2007), formulaire dédié aux conventions bilatérales", declaration:"Court séjour affaires généralement sans visa pour les Français (moins de 90 jours), mais l'exécution d'un travail technique (montage/installation) nécessite en principe une autorisation de travail marocaine distincte, à demander via l'employeur local ou le consulat.", note:"Détachement possible jusqu'à 3 ans, renouvelable une fois. Pas d'accord-cadre télétravail ; tolérance non écrite pour un télétravail ponctuel très court." },
  "Algérie": { zone:"bilateral", slug:"algerie", certificat:"Certificat bilatéral (convention franco-algérienne), formulaire dédié aux conventions bilatérales", declaration:"Visa obligatoire même pour un court séjour d'affaires (à demander avant le départ auprès du consulat) ; une autorisation de travail distincte est requise pour toute activité salariée exercée sur place.", note:"Régime d'immigration plus strict que le Maroc et la Tunisie." },
  "Tunisie": { zone:"bilateral", slug:"tunisie", certificat:"Certificat bilatéral (convention franco-tunisienne), formulaire dédié aux conventions bilatérales", declaration:"Court séjour affaires généralement sans visa pour les Français, mais une autorisation de travail est requise au-delà d'une simple visite, à demander auprès du ministère du Travail tunisien ou du consulat.", note:"Détachement possible, durée à vérifier au cas par cas." },
  "Mauritanie": { zone:"bilateral", slug:"mauritanie", certificat:GENERIC_BILAT, declaration:"Visa obligatoire, à demander avant le départ ; une autorisation de travail distincte est requise pour toute activité salariée.", note:"Convention de sécurité sociale franco-mauritanienne existante." },

  // --- Amérique du Nord ---
  "Canada": { zone:"bilateral", slug:"canada", certificat:"Certificat bilatéral (convention franco-canadienne, et convention distincte avec le Québec)", declaration:"Distinction stricte visiteur d'affaires (AVE ou visa, sans permis de travail) / travailleur (permis de travail obligatoire) ; une catégorie d'exemption existe pour l'installation ou la mise en service d'équipements (« After-Sales Service »), à faire confirmer précisément par un conseil en immigration avant le départ.", note:"Vérifier le permis de travail au-delà d'une simple visite d'affaires. Le Québec a sa propre convention, distincte du reste du Canada." },
  "États-Unis": { zone:"bilateral", slug:"etats-unis", certificat:"Certificat bilatéral (convention de sécurité sociale franco-américaine)", declaration:"Le statut ESTA/visa B-1 couvre réunions et négociations, mais pas l'exécution d'un travail manuel ou technique (montage, installation) : un visa de travail spécifique (ex. H-1B, L-1, ou B-1 « in lieu of H » selon les cas) est requis, à demander auprès de l'ambassade des États-Unis, procédure pouvant prendre plusieurs semaines à plusieurs mois.", note:"Ne pas confondre ESTA (dispense de visa touristique/affaires) et visa de travail : ce sont deux régimes distincts." },

  // --- Amérique latine ---

  "Brésil": { zone:"bilateral", slug:"bresil", certificat:GENERIC_BILAT, declaration:"Court séjour affaires généralement sans visa pour les Français (90 jours) ; un visa de travail (VITEM) est requis pour toute activité technique rémunérée sur place, à demander avant le départ.", note:"Convention de sécurité sociale franco-brésilienne existante." },
  "Chili": { zone:"bilateral", slug:"chili", certificat:GENERIC_BILAT, declaration:"Court séjour affaires généralement sans visa pour les Français ; autorisation de travail requise au-delà d'une simple visite.", note:"Convention de sécurité sociale franco-chilienne existante." },
  "Uruguay": { zone:"bilateral", slug:"uruguay", certificat:GENERIC_BILAT, declaration:"Court séjour affaires généralement sans visa pour les Français ; autorisation de travail requise au-delà d'une simple visite.", note:"Convention de sécurité sociale franco-uruguayenne existante." },
  "Mexique": { zone:"aucun", slug:"mexique", certificat:"Aucun accord de sécurité sociale avec la France identifié : aucun certificat de maintien possible.", declaration:"Court séjour affaires généralement sans visa pour les Français ; un permis de travail temporaire (visa de travailleur) est requis pour toute activité technique rémunérée, à demander avant le départ auprès du consulat.", note:"Risque de double cotisation sociale ; envisager la CFE pour un séjour prolongé." },

  // --- Europe hors UE ---
  "Turquie": { zone:"bilateral", slug:"turquie", certificat:"Certificat bilatéral (convention franco-turque du 20/01/1972, couvre toutes les branches sauf le chômage), formulaire SE 208-01", declaration:"Court séjour touristique ou affaires sans visa pour les Français (90 jours), mais toute activité technique de montage/démontage nécessite un « visa montage » spécifique : demande à déposer en personne au Consulat général de Turquie (rendez-vous en ligne), avec lettre de l'entreprise turque, autorisation ministérielle préalable (4 à 6 semaines de délai), coût 60 à 180 € en espèces. Ce visa ne peut être demandé qu'une seule fois par an, pour un maximum de 90 jours.", note:"Durée de maintien de la sécurité sociale fixée au cas par cas (article 6 de la convention). Le « visa montage » est une démarche à part entière, distincte du certificat bilatéral, à anticiper largement (délai total pouvant dépasser 6 semaines)." },

function getCountryData(pays){
  if(!pays) return null;
  const ue = UE_COUNTRIES.find(c=>c[0]===pays);
  if(ue) return {zone:'ue', nom:ue[0], portailNom:ue[1], portailUrl:ue[2], accordCadre:ue[3]};
  const other = OTHER_COUNTRIES[pays];
  if(other) return Object.assign({nom:pays}, other);
  return null;
}

function countryOptionsHtml(selected){
  const ueOptions = UE_COUNTRIES.map(c=>`<option value="${c[0]}" ${selected===c[0]?'selected':''}>${c[0]}</option>`).join('');
  const groupedHtml = REGION_GROUPS.map(([label, names])=>{
    const opts = names.filter(n=>OTHER_COUNTRIES[n]).map(n=>`<option value="${n}" ${selected===n?'selected':''}>${n}</option>`).join('');
    return `<optgroup label="${label}">${opts}</optgroup>`;
  }).join('');
  return `<option value="">— Choisir un pays —</option>
    <optgroup label="Union européenne / EEE / Suisse">${ueOptions}</optgroup>
    ${groupedHtml}`;
}

/* ============================= STOCKAGE / HISTORIQUE ============================= */

const STORAGE_KEY = 'cyim_mobilite_missions_v1';

function loadMissions(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }catch(e){ return []; }
}
function saveMissions(list){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}
function addOrUpdateMission(record){
  const list = loadMissions();
  const idx = list.findIndex(m=>m.id===record.id);
  if(idx>=0) list[idx] = record; else list.push(record);
  saveMissions(list);
}
function deleteMission(id){
  saveMissions(loadMissions().filter(m=>m.id!==id));
}


/* ============================= UTILITAIRES ============================= */

function uid(){ return 'm_' + Date.now() + '_' + Math.floor(Math.random()*10000); }

function fmtDate(d){
  if(!d) return '[date]';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function saveBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function copyText(id, btn){
  const el = document.getElementById(id);
  el.select();
  el.setSelectionRange(0, 999999);
  navigator.clipboard.writeText(el.value).then(()=>{
    const original = btn.textContent;
    btn.textContent = 'Copié ✓';
    setTimeout(()=>{ btn.textContent = original; }, 1600);
  }).catch(()=>{ alert('Copie impossible dans ce navigateur ; sélectionnez et copiez manuellement le texte.'); });
}

  { text: "Tout litige rel\u00e8vera de la comp\u00e9tence du tribunal de commerce de Rennes. A l'exception de tout autre.", italics: true },
];

function cyimRun(text, opts){
  opts = opts || {};
  return new window.docx.TextRun(Object.assign({ text: text, font: "Aptos", size: 22 }, opts));
}

function cyimHeader(){
  const { Header, Paragraph, ImageRun, AlignmentType, BorderStyle } = window.docx;
  const bytes = Uint8Array.from(atob(CYIM_LOGO_B64), c => c.charCodeAt(0));
  return new Header({
    children: [
      new Paragraph({
        alignment: AlignmentType.CENTER,
        border: { bottom: { style: BorderStyle.SINGLE, size: 6, color: "DCE3E6", space: 8 } },
        children: [ new ImageRun({ data: bytes, transformation: { width: 120, height: 40 }, type: "png" }) ],
      }),
    ],
  });
}

function cyimFooter(){
  const { Footer, Paragraph, AlignmentType } = window.docx;
  return new Footer({
    children: CYIM_FOOTER_LINES.map(line => new Paragraph({
      alignment: AlignmentType.CENTER,
      children: [ cyimRun(line.text, { bold: !!line.bold, italics: !!line.italics, size: 16 }) ],
    })),
  });
}

async function downloadSimpleDocx(title, bodyText, filename){
  if(!window.docx){
    alert("La librairie de génération Word n'a pas pu se charger (connexion internet nécessaire au premier chargement de la page). Utilisez le bouton « Copier le texte » à la place.");
    return;
  }
  const { Document, Packer, Paragraph, AlignmentType } = window.docx;
  const paragraphs = [
    new Paragraph({ text:"", spacing:{after:200} }),
    new Paragraph({ alignment: AlignmentType.CENTER, children:[ cyimRun(title, { bold:true, size: 28 }) ], spacing:{after:300} })
  ];
  bodyText.split('\n').forEach(line=>{
    if(line.trim()===''){
      paragraphs.push(new Paragraph({ text:'' }));
    } else {
      paragraphs.push(new Paragraph({ children:[ cyimRun(line) ], spacing:{after:120} }));
    }
  });
  const doc = new Document({
    styles: { default: { document: { run: { font: "Aptos", size: 22 } } } },
    sections: [{ headers: { default: cyimHeader() }, footers: { default: cyimFooter() }, properties:{}, children: paragraphs }]
  });
  const blob = await Packer.toBlob(doc);
  saveBlob(blob, filename);
}

    return { title:'Immigration et activités autorisées',

function splitMail(text){
  const idx = text.indexOf('\n');
  const firstLine = text.slice(0, idx);
  const subject = firstLine.replace(/^Objet\s*:\s*/, '');
  const body = text.slice(idx+1).replace(/^\n+/, '');
  return { subject, body };
}

function openInOutlook(toEmail, subject, body){
  const params = new URLSearchParams();
  params.set('subject', subject);
  params.set('body', body);
  const mailto = `mailto:${toEmail||''}?${params.toString().replace(/\+/g, '%20')}`;
  if(mailto.length > 1900){
    alert("Le message est trop long pour s'ouvrir automatiquement dans Outlook (limite technique des liens mailto). Utilisez « Copier le texte » et collez-le dans un nouveau mail.");
    return;
  }
  window.location.href = mailto;
}

function tt_buildDemarcheItems(){
  const s = tt.state;
  const cd = getCountryData(s.pays);
  if(!cd) return [];
  let items = [];
  if(cd.zone==='ue'){
    if(s.part==='25-50' && cd.accordCadre){
      items.push({ title:'Certificat A1 — accord-cadre télétravail transfrontalier', desc:'Ce pays est signataire de l\'accord-cadre (1er juillet 2023) : demande via le bouton « Télétravail dérogatoire » sur urssaf.fr.', link:'https://www.urssaf.fr/accueil/services/travail-etranger-mobilite.html', linkLabel:'Faire la demande sur urssaf.fr', tag:'CYIM (RH)' });
    } else if(s.part==='25-50' && !cd.accordCadre){
      items.push({ title:'Certificat A1 — procédure normale (pluriactivité)', desc:'Ce pays n\'a pas signé l\'accord-cadre : pas de bouton « Télétravail dérogatoire ». Utiliser la demande standard de détermination de législation applicable.', link:'https://www.urssaf.fr/accueil/services/travail-etranger-mobilite.html', linkLabel:'Faire la demande sur urssaf.fr', tag:'CYIM (RH)' });
    } else if(s.part==='50plus'){
      items.push({ title:'Bascule probable vers le régime local', desc:'Au-delà de 50 % du temps de travail dans le pays de résidence, l\'affiliation au régime français n\'est en principe plus possible : une analyse dédiée est nécessaire avant toute décision.', tag:'Analyse RH nécessaire' });
    } else {
      items.push({ title:'Certificat A1 — télétravail ponctuel', desc:'Pour un télétravail ponctuel et court, la demande standard suffit ; aucun accord-cadre n\'est nécessaire pour une présence aussi limitée.', link:'https://www.urssaf.fr/accueil/services/travail-etranger-mobilite.html', linkLabel:'Faire la demande sur urssaf.fr', tag:'CYIM (RH)' });
    }
  } else if(cd.zone==='uk'){
    items.push({ title:'Certificat A1 — procédure de détachement classique', desc:'Le Royaume-Uni n\'a pas signé l\'accord-cadre télétravail : la demande suit la procédure normale de détachement, plafonnée à 24 mois sans prolongation.', link:'https://www.urssaf.fr/accueil/services/travail-etranger-mobilite.html', linkLabel:'Faire la demande sur urssaf.fr', tag:'CYIM (RH)' });
  } else if(cd.zone==='bilateral'){
    items.push({ title:'Certificat bilatéral', desc: cd.certificat + (s.part==='ponctuel' ? ' Pour un télétravail ponctuel et très court, une tolérance non écrite est parfois admise, mais ce point reste juridiquement flou.' : ''), link:'https://www.urssaf.fr/accueil/services/travail-etranger-mobilite.html', linkLabel:'Faire la demande sur urssaf.fr (formulaire bilatéral)', tag:'CYIM (RH)' });
  } else if(cd.zone==='aucun'){
    items.push({ title:'Aucun certificat possible', desc:'Aucun accord de sécurité sociale avec ce pays : risque de double cotisation au-delà d\'un télétravail ponctuel. Envisager la CFE pour un séjour prolongé.', tag:'Analyse RH nécessaire' });
  }
  items.push({ title:'Vérifier l\'assurance voyage / santé', desc:'S\'assurer que la couverture santé reste valable pendant le séjour à l\'étranger.', tag:'CYIM (RH)' });
  return items;
}

/* ============================= HISTORIQUE & EXPORT ============================= */

function renderHistorique(){
  const missions = loadMissions().sort((a,b)=> new Date(b.dateEnregistrement) - new Date(a.dateEnregistrement));
  let rowsHtml = '';
  if(missions.length===0){
    rowsHtml = '';
  } else {
    rowsHtml = missions.map(m=>{
      const nbFait = (m.demarches||[]).filter(d=>d.fait).length;
      const nbTotal = (m.demarches||[]).length;
      const chip = nbTotal>0 && nbFait===nbTotal ? `<span class="status-chip done">${nbFait}/${nbTotal} faites</span>` : `<span class="status-chip progress">${nbFait}/${nbTotal} faites</span>`;
      return `<tr>
        <td>${new Date(m.dateEnregistrement).toLocaleDateString('fr-FR')}</td>
        <td><strong>${m.salarie}</strong><br><span style="color:var(--muted);font-size:12px;">${m.poste||''}</span></td>
        <td>${m.module}</td>
        <td>${m.pays||'—'}</td>
        <td>${m.dateDebut ? fmtDate(m.dateDebut)+' → '+fmtDate(m.dateFin) : '—'}</td>
        <td>${m.qualification||'—'}</td>
        <td>${chip}</td>
        <td><button class="row-del" onclick="histo_delete('${m.id}')">Supprimer</button></td>
      </tr>`;
    }).join('');
  }

  const tableOrEmpty = missions.length===0
    ? `<div class="empty-state">Aucune mission enregistrée pour l'instant. Utilisez le bouton « Valider la démarche accomplie » dans les modules Détachement ou Télétravail pour alimenter cet historique.</div>`
    : `<table class="histo">
        <thead><tr><th>Enregistré le</th><th>Salarié</th><th>Module</th><th>Pays</th><th>Dates mission</th><th>Qualification</th><th>Avancement</th><th></th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>`;

  document.getElementById('appRoot').innerHTML = `<main style="max-width:1100px;">
    <div class="eyebrow">Historique & export</div>
    <h2>Suivi des missions et déplacements</h2>
    <p class="panel-sub">Cet historique est stocké localement dans votre navigateur (aucun serveur) — il est propre à cet ordinateur et à ce navigateur. Pour un suivi partagé entre plusieurs personnes RH, exportez régulièrement en Excel et centralisez le fichier sur votre espace partagé habituel.</p>
    <div class="card">
      <div class="btn-row" style="margin-top:0;">
        <button class="btn" onclick="exportHistoriqueExcel()">Exporter en Excel (.xlsx)</button>
        <button class="btn secondary" onclick="histo_clearAll()">Vider l'historique</button>
      </div>
    </div>
    <div class="card" style="padding:0; overflow-x:auto;">${tableOrEmpty}</div>
    <footer class="appfoot">L'export Excel reprend, pour chaque mission validée, le détail des démarches et leur statut (fait / à faire), pour une traçabilité complète par salarié.<br>Dernière mise à jour : juillet 2026.</footer>
  </main>`;
}

function histo_delete(id){
  if(confirm('Supprimer cette entrée de l\'historique ?')){
    deleteMission(id);
    renderHistorique();
  }
}

function histo_clearAll(){
  if(confirm('Vider tout l\'historique local ? Cette action est irréversible.')){
    saveMissions([]);
    renderHistorique();
  }
}

function exportHistoriqueExcel(){
  if(!window.XLSX){
    alert("La librairie d'export Excel n'a pas pu se charger (connexion internet nécessaire au premier chargement de la page).");
    return;
  }
  const missions = loadMissions();
  if(missions.length===0){ alert('Aucune mission à exporter.'); return; }

  const summaryRows = missions.map(m=>({
    "Date d'enregistrement": new Date(m.dateEnregistrement).toLocaleDateString('fr-FR'),
    "Salarié": m.salarie, "Poste": m.poste||'', "Statut": m.statut||'',
    "Module": m.module, "Pays": m.pays||'', "Client/congrès": m.client||'', "Ville": m.ville||'',
    "Date début": m.dateDebut ? fmtDate(m.dateDebut) : '', "Date fin": m.dateFin ? fmtDate(m.dateFin) : '',
    "Qualification": m.qualification||'', "N° certificat": m.numeroA1||'',
    "Démarches faites": (m.demarches||[]).filter(d=>d.fait).length,
    "Démarches totales": (m.demarches||[]).length,
    "Validé": m.validated ? 'Oui' : 'Non',
  }));

  const detailRows = [];
  missions.forEach(m=>{
    (m.demarches||[]).forEach(d=>{
      detailRows.push({
        "Salarié": m.salarie, "Module": m.module, "Pays": m.pays||'',
        "Démarche": d.titre, "Statut": d.fait ? 'Fait' : 'À faire',
        "Date d'enregistrement": new Date(m.dateEnregistrement).toLocaleDateString('fr-FR')
      });
    });
  });

  const wb = XLSX.utils.book_new();
  const ws1 = XLSX.utils.json_to_sheet(summaryRows);
  const ws2 = XLSX.utils.json_to_sheet(detailRows);
  XLSX.utils.book_append_sheet(wb, ws1, "Missions");
  XLSX.utils.book_append_sheet(wb, ws2, "Démarches (détail)");
  XLSX.writeFile(wb, `Suivi_detachement_teletravail_CYIM_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function renderDocumentation(){
  const entries = [
    ["Qu'est-ce que le détachement ?", `<p>Le détachement désigne la situation dans laquelle un employeur envoie temporairement un salarié exécuter une prestation de travail dans un autre pays, tout en maintenant le contrat de travail d'origine et, en principe, le rattachement à la sécurité sociale du pays de départ.</p>
      <p><strong>Deux cadres juridiques distincts :</strong> la sécurité sociale (règlement européen 883/2004, certificat A1) et le droit du travail (directive 96/71/CE modifiée par la directive 2018/957, qui impose un socle de règles impératives du pays d'accueil pendant la mission).</p>
      <p><strong>Durée :</strong> le détachement est temporaire (jusqu'à 24 mois au sein de l'UE via le certificat A1). Au-delà, on parle d'expatriation : bascule vers le régime social local ou la Caisse des Français de l'Étranger (CFE).</p>`],
    ["Pourquoi le montage/démontage n'est jamais dispensé", `<p>L'arrêté du 4 juin 2019 dispense de déclaration certaines catégories (artistes jusqu'à 90 jours/12 mois, colloques et manifestations scientifiques jusqu'à 12 mois), mais exclut explicitement « les activités de montage ou de démontage d'équipements ou d'installations provisoires, de restauration, de transport, de surveillance et de sécurité des sites dédiés aux manifestations ».</p>
      <p>Concrètement : un intervenant ou un conférencier peut être dispensé de déclaration, mais l'équipe technique qui monte et exploite le dispositif audiovisuel ne l'est jamais.</p>`],
    ["Le certificat A1 : validité et renouvellement", `<p>Le certificat A1 correspond aux dates précises de la mission déclarée, dans la limite de 24 mois. Il ne couvre pas automatiquement les missions suivantes : une nouvelle mission nécessite en principe une nouvelle demande, même pour un déplacement très court (48h suffisent à déclencher l'obligation).</p>
      <p><strong>Pour les déplacements récurrents</strong> (commerciaux notamment), l'Urssaf recommande de basculer vers le statut de pluriactivité plutôt que de multiplier les déclarations de détachement à chaque voyage.</p>
      <p><strong>Certificat de mobilité internationale</strong> est le terme générique de l'Urssaf recouvrant trois documents différents : le certificat A1 (UE/EEE/Suisse/UK), le certificat bilatéral (41 pays à accord), et le certificat de maintien à la Sécurité sociale française (autres pays).</p>`],
    ["La déclaration préalable dans le pays d'accueil", `<p>Chaque pays de l'UE/EEE/Suisse a son propre système de déclaration préalable (l'équivalent du SIPSI français, qui lui ne concerne que les entreprises étrangères envoyant des salariés vers la France). Il n'existe pas de guichet unique européen à ce jour.</p>
      <p>Le module Détachement de cet outil ouvre automatiquement le bon portail selon le pays choisi.</p>`],
    ["Le « noyau dur » du droit du travail local", `<p>Dès qu'un salarié est détaché, l'article 3 de la directive 96/71/CE impose de respecter, pendant la mission, un socle de règles impératives du pays d'accueil : salaire minimal local, durée maximale du travail et repos, congés payés minimaux, santé et sécurité au travail.</p>
      <p>C'est une obligation distincte de la déclaration préalable : l'une ne couvre pas l'autre.</p>`],
    ["L'attestation de détachement CYIM", `<p>Document interne, rédigé et signé par l'employeur (CYIM), qui formalise la mission — à distinguer du certificat A1, délivré par l'Urssaf et qui ne concerne que la sécurité sociale.</p>
      <p>Le module Détachement génère ce document pré-rempli à partir des informations saisies (Étape 4).</p>`],
    ["Contrat de travail et bulletin de paie : pourquoi les emporter", `<p>Ils permettent aux autorités du pays d'accueil de vérifier que le salarié a une relation de travail réelle et préexistante avec CYIM, et que les cotisations sociales françaises sont effectivement payées.</p>
      <p><strong>Risque en cas d'absence de ces documents lors d'un contrôle :</strong> la présomption de détachement régulier peut être remise en cause, avec un risque de rappel de cotisations locales, d'amende, et de complications pour le salarié sur place.</p>`],
    ["Assurance voyage professionnelle", `<p>Distincte de l'assurance santé habituelle : elle couvre les frais médicaux à l'étranger, l'assistance et le rapatriement, la responsabilité civile professionnelle et parfois le matériel transporté.</p>
      <p>Un contrat annuel « multi-voyages » couvre en général tous les déplacements de l'année sans démarche à chaque départ. Une attestation ponctuelle reste parfois nécessaire pour un pays ou un client exigeant un justificatif nominatif.</p>`],
    ["Rapatriement", `<p>Deux logiques différentes : le <strong>rapatriement sanitaire</strong> (maladie, accident), couvert par l'assurance voyage, et le <strong>rapatriement sécuritaire</strong> (crise politique, catastrophe), qui relève de la vigilance de l'employeur — inscription sur le portail Ariane (diplomatie.gouv.fr) recommandée pour les destinations sensibles.</p>`],
    ["Détachement ou télétravail : comment choisir le bon module", `<p>La question clé : le salarié va-t-il exécuter une prestation pour un client sur place (montage, installation, formation) ? Si oui, c'est un détachement. Si le salarié travaille uniquement à distance pour CYIM, sans client local, c'est du télétravail.</p>
      <p>Chaque module de cet outil propose un bouton pour basculer vers l'autre si la réponse initiale s'avère incorrecte.</p>`],
    ["Intermittents et auto-entrepreneurs (module Détachement uniquement)", `<p><strong>Intermittents (CDDU) :</strong> mêmes règles qu'un salarié permanent ; CYIM (RH) fait la demande de certificat A1.</p>
      <p><strong>Auto-entrepreneurs :</strong> pas de lien de subordination, donc pas de « détachement » au sens strict — mais l'auto-entrepreneur doit obtenir son propre certificat A1 en tant que travailleur indépendant. CYIM doit vérifier l'existence de ce document avant la mission (devoir de vigilance).</p>
      <p>Ces deux statuts ne concernent que le module Détachement (missions congrès) : le télétravail ne s'applique qu'aux salariés de CYIM.</p>`],
    ["Visa ou permis de travail : quelle différence ?", `<p>Ce sont deux autorisations différentes, parfois fusionnées en un seul document selon les pays :</p>
      <p><strong>Le visa</strong> autorise l'entrée sur le territoire (touristique, affaires, etc.). Un visa d'affaires ou une dispense de visa pour un court séjour couvre en général les réunions et négociations, mais pas l'exécution d'un travail technique.</p>
      <p><strong>Le permis (ou autorisation) de travail</strong> autorise l'exercice d'une activité rémunérée sur place. C'est une démarche distincte, souvent plus longue, à instruire séparément — parfois auprès d'un ministère du Travail local, parfois directement au consulat.</p>
      <p><strong>Exemple concret (Turquie) :</strong> un technicien qui monte un stand ou un dispositif audiovisuel a besoin d'un « visa montage » spécifique, distinct du simple visa touristique. La démarche se fait en personne au Consulat général de Turquie, avec une lettre de l'entreprise turque, une autorisation ministérielle préalable (4 à 6 semaines) et un coût de 60 à 180 €. Il ne peut être demandé qu'une fois par an, pour 90 jours maximum.</p>
      <p>Dans l'outil, la démarche « Immigration : visa et/ou permis de travail » renvoie vers les conseils aux voyageurs officiels (France Diplomatie) pour le pays choisi ; ce lien couvre l'entrée et donne un premier niveau d'information, mais la démarche de permis de travail proprement dite, quand elle existe, doit être confirmée et engagée auprès du consulat ou de l'autorité locale compétente.</p>`],
    ["Stockage sécurisé des documents des salariés", `<p>Cet outil ne stocke aucun document (passeport, contrat, etc.) : ce serait un risque de sécurité, un site sans serveur ne peut pas garantir une confidentialité réelle par salarié.</p>
      <p><strong>Piste à envisager :</strong> un espace que CYIM contrôle déjà (SharePoint ou OneDrive), avec des permissions restreintes par salarié, où l'authentification serait gérée par Microsoft et non par cet outil. Ce sujet reste à instruire séparément avant toute mise en place.</p>`],
  ];
  const html = entries.map(([title,body])=>`<details class="doc-entry"><summary>${title}</summary><div class="doc-body">${body}</div></details>`).join('');

  document.getElementById('appRoot').innerHTML = `<main style="max-width:820px;">
    <div class="eyebrow">Documentation</div>
    <h2>Comprendre le détachement et le télétravail</h2>
    <p class="panel-sub">Rappels issus des notes de synthèse CYIM. Cliquez sur une question pour la déplier.</p>
    ${html}
    <footer class="appfoot">Pour le détail juridique complet, les modèles et la cartographie exhaustive par pays, se référer aux notes de synthèse « Détachement du personnel à l'étranger » et « Télétravail hors France ».<br>Dernière mise à jour : juillet 2026.</footer>
  </main>`;
}
